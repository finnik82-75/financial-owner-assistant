<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Архитектура Бизнеса{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="brand-link">
                <span class="logo-panel">
                    <img src="/static/img/logo.svg" alt="Архитектура Бизнеса" class="header-logo">
                </span>
            </a>
            <nav class="header-nav">
                <a href="/">Главная</a>
                <a href="/upload">Загрузить отчёт</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div>Архитектура Бизнеса</div>
            <div>ИИ-анализ управленческой отчётности</div>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
